<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>H1quit | IT Operations</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    color: white;
}

/* 背景 */
#particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: linear-gradient(120deg, #1e3c72, #2a5298);
}

/* 内容 */
.container {
    max-width: 900px;
    margin: auto;
    padding: 80px 20px;
}

/* 标题 */
h1 {
    text-align: center;
    font-size: 48px;
}

/* 简介 */
.intro {
    text-align: center;
    margin: 20px 0 50px;
    line-height: 1.8;
}

.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.btn:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.1);
}

/* 技能 */
.skills span {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    margin: 5px;
    padding: 8px 15px;
    border-radius: 20px;
}

/* 项目 */
.project {
    margin-bottom: 15px;
}

/* 联系方式 */
.contact {
    text-align: center;
    margin-top: 30px;
    color: #ddd;
}

/* 动画 */
h1, .intro, .card {
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">

<h1>H1quit | IT Operations 👨‍💻</h1>

<div class="intro">
目前专注于 IT 运维方向学习，系统掌握 Linux 基础操作、网络原理及服务器部署流程，能够独立完成基础环境配置与 Web 服务搭建，并具备初步的故障排查能力，持续通过实践提升工程经验，目标成为一名具备实际运维能力的工程师。
</div>

<div style="text-align:center; margin-top:40px;">

<a href="skills.html" class="btn">
<i class="fas fa-tools"></i> 技能
</a>

<a href="projects.html" class="btn">
<i class="fas fa-server"></i> 运维实践
</a>

</div>



<div class="contact">
<i class="fas fa-envelope"></i> your@email.com
</div>

</div>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 2 },
    line_linked: { enable: true }
  }
});
</script>

</body>
</html>
