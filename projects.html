<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>运维实践 | H1quit</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(120deg, #1e3c72, #2a5298);
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 80px 20px;
    text-align: center;
}

h1 {
    margin-bottom: 40px;
}

/* 项目卡片（同步技能风格） */
.projects {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.project {
    background: rgba(255,255,255,0.1);
    margin: 10px;
    padding: 20px;
    border-radius: 15px;
    width: 260px;
    transition: 0.3s;
}

.project:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.3);
}

/* 返回按钮（同步技能页） */
.back {
    margin-top: 50px;
    display: inline-block;
    padding: 10px 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    text-decoration: none;
    color: white;
}

.back:hover {
    background: rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<div class="container">

<h1>💻 运维实践</h1>

<div class="projects">

<div class="project">
<h3><i class="fas fa-globe"></i> 网站部署</h3>
<p>基于 GitHub Pages 完成静态网站搭建与发布。</p>
</div>

<div class="project">
<h3><i class="fab fa-docker"></i> Docker 实践</h3>
<p>使用 Docker 部署 Web 服务并进行端口映射。</p>
</div>

<div class="project">
<h3><i class="fas fa-terminal"></i> Linux 配置</h3>
<p>完成用户管理、权限控制及基础服务部署。</p>
</div>

</div>

<a href="index.html" class="back">⬅ 返回首页</a>

</div>

</body>
</html>
